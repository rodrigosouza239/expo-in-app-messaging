plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.inappmessaging'
version = '1.1.0'

android {
  namespace "expo.modules.inappmessaging"
  defaultConfig {
    versionCode 1
    versionName "1.1.0"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
   implementation("com.google.firebase:firebase-inappmessaging:22.0.2")
}
